name: DevSecOps CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy App (Docker)
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          # Assuming you have a docker-compose.yml on the server setup
          script: |
            # Navigate to the application directory on your server
            cd ~/my-php-app
            
            # Pull the latest code 
            git pull origin main
            
            # Restart the Docker containers
            docker-compose down
            docker-compose up -d --build

  security-testing:
    name: Security Testing (OWASP ZAP)
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Grant Workspace Permissions
        run: chmod -R 777 $GITHUB_WORKSPACE

      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          # Target the live URL of your deployed application
          target: 'http://${{ secrets.SERVER_HOST }}'
          issue_title: 'ZAP Security Alert'
          fail_action: false
