version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: php_app_web
    ports:
      - "80:80"
    depends_on:
      - db
    environment:
      # You can update db.php to read these environment variables or update these values to match your code
      - DB_HOST=db
      - DB_USER=root
      - DB_PASS=rootpassword
      - DB_NAME=zap_demo
    restart: unless-stopped

  db:
    image: mysql:8.0
    container_name: php_app_db
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: zap_demo
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      # Automatically initialize the database using your setup.sql file
      - ./setup.sql:/docker-entrypoint-initdb.d/setup.sql:ro
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password

volumes:
  db_data:
