      <stop offset="0%" style="stop-color:#0099FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0055AA;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Shield outline -->
  <path d="M128 16L32 56v72c0 53.02 40.94 102.58 96 120 55.06-17.42 96-66.98 96-120V56L128 16z" fill="url(#shield)" opacity="0.15" stroke="#00549E" stroke-width="6"/>
